services:
  sqlite-init:
    image: duckdb/duckdb:latest
    command:
      - /duckdb
      - -c
      - |
        INSTALL ducklake;
        LOAD ducklake;
        ATTACH 'ducklake:sqlite:/data/metadata.sqlite' AS my_ducklake
          (DATA_PATH '/data/data_files/');
        USE my_ducklake;
        CHECKPOINT;
    volumes:
      - sqlite-data:/data
    profiles:
      - sqlite

  trino:
    image: trino-ducklake
    build: .
    ports:
      - "8080:8080"
    environment:
      FS_MODE: local
      METADATA_CONNECTION_STRING: "jdbc:sqlite:/data/metadata.sqlite"
    depends_on:
      sqlite-init:
        condition: service_completed_successfully
    volumes:
      - sqlite-data:/data
    profiles:
      - sqlite

  # PostgreSQL metadata mode
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: ducklake_meta
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - postgres
      - minio

  postgres-create-dbs:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      PGPASSWORD: testpass
    command:
      - /bin/sh
      - -ec
      - |
        until pg_isready -h postgres -U postgres >/dev/null 2>&1; do
          sleep 1
        done
        psql -h postgres -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'ducklake_meta_s3'" | grep -q 1 ||
          psql -h postgres -U postgres -d postgres -c "CREATE DATABASE ducklake_meta_s3"
    depends_on:
      - postgres
    profiles:
      - postgres
      - minio

  ducklake-init-postgres:
    image: duckdb/duckdb:latest
    command:
      - /duckdb
      - -c
      - |
        INSTALL ducklake;
        LOAD ducklake;
        INSTALL postgres;
        LOAD postgres;
        ATTACH 'ducklake:postgres:host=postgres port=5432 dbname=ducklake_meta user=postgres password=testpass' AS my_ducklake
          (DATA_PATH '/data/data_files/');
        USE my_ducklake;
        CHECKPOINT;
    depends_on:
      postgres-create-dbs:
        condition: service_completed_successfully
    volumes:
      - local-data:/data/data_files
    profiles:
      - postgres

  ducklake-init-s3:
    image: duckdb/duckdb:latest
    command:
      - /duckdb
      - -c
      - |
        INSTALL ducklake;
        LOAD ducklake;
        INSTALL postgres;
        LOAD postgres;
        INSTALL aws;
        LOAD aws;
        CREATE OR REPLACE SECRET ducklake_minio (
            TYPE s3,
            KEY_ID 'minioadmin',
            SECRET 'minioadmin',
            REGION 'us-east-1',
            ENDPOINT 'minio:9000',
            URL_STYLE 'path',
            USE_SSL false
        );
        ATTACH 'ducklake:postgres:host=postgres port=5432 dbname=ducklake_meta_s3 user=postgres password=testpass' AS my_ducklake
          (DATA_PATH 's3://ducklake/');
        USE my_ducklake;
        CHECKPOINT;
    depends_on:
      postgres-create-dbs:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    profiles:
      - minio

  trino-postgres:
    image: trino-ducklake
    build: .
    ports:
      - "8080:8080"
    environment:
      FS_MODE: local
      METADATA_CONNECTION_STRING: "jdbc:postgresql://postgres:5432/ducklake_meta?user=postgres&password=testpass"
    depends_on:
      ducklake-init-postgres:
        condition: service_completed_successfully
    volumes:
      - local-data:/data/data_files
    profiles:
      - postgres

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - minio

  # Create the default bucket on startup
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/ducklake;
      "
    profiles:
      - minio

  trino-minio:
    image: trino-ducklake
    build: .
    ports:
      - "8080:8080"
    environment:
      FS_MODE: s3
      METADATA_CONNECTION_STRING: "jdbc:postgresql://postgres:5432/ducklake_meta_s3?user=postgres&password=testpass"
      S3_REGION: "us-east-1"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      ducklake-init-s3:
        condition: service_completed_successfully
    profiles:
      - minio

volumes:
  pgdata:
  minio-data:
  sqlite-data:
  local-data:
